name: Frontend

on:
  pull_request:
    branches: [develop]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/frontend.yml'
  push:
    branches: [develop]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run --cwd apps/web check

      - name: Build
        run: bun run --cwd apps/web build

      - name: Unit and component tests
        run: bun run --cwd apps/web test:unit

      - name: Install Playwright Chromium
        run: bun run --cwd apps/web playwright install --with-deps chromium

      - name: E2E smoke tests
        run: bun run --cwd apps/web test:e2e
