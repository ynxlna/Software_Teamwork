name: Parser Service

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/parser/**'
      - '.github/workflows/parser-service.yml'
  push:
    branches: [develop]
    paths:
      - 'services/parser/**'
      - '.github/workflows/parser-service.yml'

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/parser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv==0.11.6

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Compile
        run: uv run python -m compileall src tests
