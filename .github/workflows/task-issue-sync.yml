name: Task Issue Sync

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Sync task issue metadata
        uses: actions/github-script@v7
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        with:
          script: |
            const projectOwner = 'Sakayori-Iroha-168';
            const projectNumber = 1;
            const projectName = 'Software Teamwork';
            const projectGraphql = async (query, variables = {}) => {
              if (!process.env.PROJECTS_TOKEN) {
                return github.graphql(query, variables);
              }

              const response = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  authorization: `Bearer ${process.env.PROJECTS_TOKEN}`,
                  accept: 'application/vnd.github+json',
                  'content-type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              const payload = await response.json();
              if (!response.ok || payload.errors?.length) {
                const requestId = response.headers.get('x-github-request-id');
                const errors = payload.errors?.map((error) => error.message).join('; ') || `${response.status} ${response.statusText}`;
                throw new Error(`GitHub GraphQL request failed via PROJECTS_TOKEN: ${errors}${requestId ? ` (request id ${requestId})` : ''}`);
              }

              return payload.data;
            };
            const issue = context.payload.issue;
            const body = issue.body || '';
            const previousBody = context.payload.changes?.body?.from || '';

            const parseTaskCode = (title) => {
              const bracketedMatch = title.trim().match(/^\[([SABCF]-(?:\d{8}-)?\d{2,3})\]\s+.+$/u);
              if (bracketedMatch) {
                return { taskCode: bracketedMatch[1], legacyTitle: false };
              }
              const bareMatch = title.trim().match(/^([SABCF]-(?:\d{8}-)?\d{2,3})\s+.+$/u);
              return bareMatch
                ? { taskCode: bareMatch[1], legacyTitle: true }
                : { taskCode: '', legacyTitle: false };
            };

            const { taskCode, legacyTitle } = parseTaskCode(issue.title || '');
            const mentionsProject = body.includes(`GitHub Project`) && body.includes(projectName);

            if (!taskCode || !mentionsProject) {
              core.info('Issue does not look like a managed task issue; skipping.');
              return;
            }
            if (legacyTitle) {
              core.warning(`Issue title uses legacy task format. Use '[${taskCode}] ...' for new task issues.`);
            }
            core.info(`Using ${process.env.PROJECTS_TOKEN ? 'PROJECTS_TOKEN' : 'GITHUB_TOKEN'} for Project GraphQL sync.`);

            const prefix = taskCode[0];
            const defaultGroupByPrefix = {
              A: 'L1nggTeam',
              B: 'JerryTeam',
              C: 'PrimeTeam',
              F: 'Frontend',
              S: 'Special',
            };
            const moduleLabelByModule = {
              gateway: 'service:gateway',
              auth: 'service:auth',
              file: 'service:file',
              qa: 'service:qa',
              knowledge: 'service:knowledge',
              document: 'service:document',
              'ai-gateway': 'service:ai-gateway',
              parser: 'service:parser',
              frontend: 'frontend',
              deploy: 'deployment',
              ci: 'ci',
              openapi: 'documentation',
            };

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const cleanValue = (value) => value
              .trim()
              .replace(/^`|`$/g, '')
              .replace(/`/g, '')
              .trim();

            const readBodyField = (issueBody, label) => {
              const pattern = new RegExp(`^-\\s*${escapeRegExp(label)}\\s*[:：]\\s*(.+)$`, 'imu');
              const match = (issueBody || '').match(pattern);
              return match ? cleanValue(match[1]) : '';
            };
            const readField = (label) => readBodyField(body, label);

            const normalizeDependency = (value) => {
              const normalized = cleanValue(value || '');
              if (!normalized || normalized === '无') {
                return '无';
              }
              return normalized
                .split(/[，,、\s]+/u)
                .map((item) => cleanValue(item))
                .filter(Boolean)
                .join(', ') || '无';
            };
            const extractIssueNumbers = (value) => {
              const normalized = cleanValue(value || '');
              if (!normalized || normalized === '无') {
                return [];
              }

              const numbers = new Set();
              for (const match of normalized.matchAll(/#(\d+)\b/gu)) {
                numbers.add(Number(match[1]));
              }

              return [...numbers].filter((number) => Number.isInteger(number) && number > 0);
            };

            const issueStatus = readField('状态') || 'Draft';
            const group = defaultGroupByPrefix[prefix];
            const bodyGroup = readField('主责小组');
            if (bodyGroup && bodyGroup !== group) {
              core.warning(`Issue body group '${bodyGroup}' does not match task prefix '${prefix}'; using '${group}'.`);
            }
            const priority = readField('优先级') || 'P1';
            const batch = readField('批次') || 'Batch 4';
            const moduleName = readField('模块') || 'ci';
            const explicitRisk = readField('Risk');
            const risk = issueStatus === 'Blocked'
              ? 'Blocked'
              : (issueStatus === 'Draft' ? (explicitRisk || 'Needs Decision') : 'Normal');
            const dependency = normalizeDependency(readField('依赖任务'));
            const dependencyIssueNumbers = extractIssueNumbers(readField('依赖任务'));
            const blockingIssueNumbers = extractIssueNumbers(readField('阻塞任务'));
            const previousDependencyIssueNumbers = extractIssueNumbers(readBodyField(previousBody, '依赖任务'));
            const previousBlockingIssueNumbers = extractIssueNumbers(readBodyField(previousBody, '阻塞任务'));
            const projectStatusByIssueStatus = {
              Draft: 'Todo',
              Ready: 'Todo',
              Blocked: 'In Progress',
              'In Progress': 'In Progress',
              Review: 'In Progress',
              Done: 'Done',
            };
            const projectStatus = projectStatusByIssueStatus[issueStatus] || 'Todo';

            const labelsToAdd = new Set();
            if (['L1nggTeam', 'JerryTeam', 'PrimeTeam'].includes(group)) {
              labelsToAdd.add(group);
            }
            const moduleLabel = moduleLabelByModule[moduleName];
            if (moduleLabel) {
              labelsToAdd.add(moduleLabel);
            }

            if (labelsToAdd.size > 0) {
              const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const existingLabelNames = new Set(existingLabels.map((label) => label.name));
              const validLabels = [...labelsToAdd].filter((label) => existingLabelNames.has(label));
              const missingLabels = [...labelsToAdd].filter((label) => !existingLabelNames.has(label));

              if (missingLabels.length > 0) {
                core.warning(`Skipping missing labels: ${missingLabels.join(', ')}`);
              }

              if (validLabels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: validLabels,
                });
              }
            }

            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const itemQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project {
                          id
                          title
                        }
                      }
                    }
                  }
                }
              }
            `;
            const addItemMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            `;
            const updateFieldMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: $value
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;
            const addBlockedByMutation = `
              mutation($issueId: ID!, $blockingIssueId: ID!) {
                addBlockedBy(input: {issueId: $issueId, blockingIssueId: $blockingIssueId}) {
                  issue {
                    number
                  }
                  blockingIssue {
                    number
                  }
                }
              }
            `;
            const removeBlockedByMutation = `
              mutation($issueId: ID!, $blockingIssueId: ID!) {
                removeBlockedBy(input: {issueId: $issueId, blockingIssueId: $blockingIssueId}) {
                  issue {
                    number
                  }
                  blockingIssue {
                    number
                  }
                }
              }
            `;
            const currentIssue = {
              number: issue.number,
              node_id: issue.node_id,
              title: issue.title || '',
              body,
            };
            const nodeIdByIssueNumber = new Map([[issue.number, issue.node_id]]);
            const issueByNumber = new Map([[issue.number, currentIssue]]);
            const cacheIssue = (candidateIssue) => {
              if (!candidateIssue?.number) {
                return candidateIssue;
              }

              const cachedIssue = issueByNumber.get(candidateIssue.number) || {};
              const mergedIssue = { ...cachedIssue };
              for (const [key, value] of Object.entries(candidateIssue)) {
                if (value !== null && value !== undefined) {
                  mergedIssue[key] = value;
                }
              }
              issueByNumber.set(candidateIssue.number, mergedIssue);
              if (mergedIssue.node_id) {
                nodeIdByIssueNumber.set(candidateIssue.number, mergedIssue.node_id);
              }
              return mergedIssue;
            };
            const getIssueDependencies = async (issueNumber, direction) => {
              const route = direction === 'blocked_by'
                ? 'GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by'
                : 'GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocking';
              const response = await github.request(route, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              return response.data
                .filter((dependencyIssue) => Number.isInteger(dependencyIssue.number))
                .map(cacheIssue);
            };
            const resolveIssue = async (issueNumber) => {
              const cachedIssue = issueByNumber.get(issueNumber);
              if (
                cachedIssue?.node_id
                && typeof cachedIssue.title === 'string'
                && typeof cachedIssue.body === 'string'
              ) {
                return cachedIssue;
              }

              const response = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              return cacheIssue(response.data);
            };
            const resolveRelationshipIssue = async (candidateIssue) => {
              const cachedIssue = cacheIssue(candidateIssue);
              if (!cachedIssue?.number) {
                throw new Error('Native issue relationship endpoint returned an issue without a number.');
              }
              return resolveIssue(cachedIssue.number);
            };
            const resolveIssueNodeId = async (issueNumber) => {
              if (nodeIdByIssueNumber.has(issueNumber)) {
                return nodeIdByIssueNumber.get(issueNumber);
              }

              const resolvedIssue = await resolveIssue(issueNumber);
              if (!resolvedIssue?.node_id) {
                throw new Error(`Issue #${issueNumber} is missing node_id.`);
              }
              return resolvedIssue.node_id;
            };
            const issueBodyReferences = (candidateIssue, label) => new Set(
              extractIssueNumbers(readBodyField(candidateIssue?.body || '', label))
            );
            const bodyDeclaresDependency = (blockedIssue, blockingIssueNumber) => (
              issueBodyReferences(blockedIssue, '依赖任务').has(blockingIssueNumber)
            );
            const bodyDeclaresBlocking = (blockingIssue, blockedIssueNumber) => (
              issueBodyReferences(blockingIssue, '阻塞任务').has(blockedIssueNumber)
            );
            const isManagedTaskIssue = (candidateIssue) => {
              const candidateBody = candidateIssue?.body || '';
              const candidateTaskCode = parseTaskCode(candidateIssue?.title || '').taskCode;
              return Boolean(candidateTaskCode && candidateBody.includes('GitHub Project') && candidateBody.includes(projectName));
            };
            const relationshipDeclaredByEitherSide = ({ blockedIssue, blockingIssue }) => (
              bodyDeclaresDependency(blockedIssue, blockingIssue.number)
              || bodyDeclaresBlocking(blockingIssue, blockedIssue.number)
            );
            const shouldRemoveStaleBlockedBy = ({ blockedIssue, blockingIssue, previouslyDeclaredByThisIssue }) => {
              if (relationshipDeclaredByEitherSide({ blockedIssue, blockingIssue })) {
                core.info(`Preserving native issue relationship: #${blockedIssue.number} is blocked by #${blockingIssue.number} because a task body still declares it.`);
                return false;
              }
              if (!previouslyDeclaredByThisIssue) {
                core.info(`Preserving native issue relationship: #${blockedIssue.number} is blocked by #${blockingIssue.number} because this edit did not remove it from the task fields.`);
                return false;
              }
              if (!isManagedTaskIssue(blockingIssue) || !isManagedTaskIssue(blockedIssue)) {
                core.info(`Preserving native issue relationship: #${blockedIssue.number} is blocked by #${blockingIssue.number} because the other endpoint is not a managed task issue.`);
                return false;
              }
              return true;
            };
            const addBlockedByRelationship = async ({ issueId, issueNumber, blockingIssueId, blockingIssueNumber }) => {
              try {
                await github.graphql(addBlockedByMutation, {
                  issueId,
                  blockingIssueId,
                });
                core.info(`Added native issue relationship: #${issueNumber} is blocked by #${blockingIssueNumber}.`);
                return true;
              } catch (error) {
                if (/already|exist/i.test(error.message || '')) {
                  core.info(`Native issue relationship already exists: #${issueNumber} is blocked by #${blockingIssueNumber}.`);
                  return false;
                }

                throw error;
              }
            };
            const removeBlockedByRelationship = async ({ issueId, issueNumber, blockingIssueId, blockingIssueNumber }) => {
              await github.graphql(removeBlockedByMutation, {
                issueId,
                blockingIssueId,
              });
              core.info(`Removed native issue relationship: #${issueNumber} is blocked by #${blockingIssueNumber}.`);
            };
            const syncNativeIssueRelationships = async () => {
              const upstreamIssueNumbers = dependencyIssueNumbers.filter((issueNumber) => issueNumber !== issue.number);
              const downstreamIssueNumbers = blockingIssueNumbers.filter((issueNumber) => issueNumber !== issue.number);
              const targetBlockedBy = new Set(upstreamIssueNumbers);
              const targetBlocking = new Set(downstreamIssueNumbers);
              const previouslyDeclaredBlockedBy = new Set(previousDependencyIssueNumbers);
              const previouslyDeclaredBlocking = new Set(previousBlockingIssueNumbers);

              if (dependencyIssueNumbers.includes(issue.number) || blockingIssueNumbers.includes(issue.number)) {
                core.warning(`Skipping self-referential native issue relationship for #${issue.number}.`);
              }

              const existingBlockedBy = await getIssueDependencies(issue.number, 'blocked_by');
              const existingBlocking = await getIssueDependencies(issue.number, 'blocking');
              const existingBlockedByNumbers = new Set(existingBlockedBy.map((dependencyIssue) => dependencyIssue.number));
              const existingBlockingNumbers = new Set(existingBlocking.map((dependencyIssue) => dependencyIssue.number));
              let addedCount = 0;
              let skippedCount = 0;
              let removedCount = 0;

              for (const upstreamIssue of existingBlockedBy) {
                const upstreamIssueNumber = upstreamIssue.number;
                if (targetBlockedBy.has(upstreamIssueNumber)) {
                  continue;
                }

                const blockingIssue = await resolveRelationshipIssue(upstreamIssue);
                const shouldRemove = shouldRemoveStaleBlockedBy({
                  blockedIssue: currentIssue,
                  blockingIssue,
                  previouslyDeclaredByThisIssue: previouslyDeclaredBlockedBy.has(upstreamIssueNumber),
                });
                if (!shouldRemove) {
                  skippedCount += 1;
                  continue;
                }

                await removeBlockedByRelationship({
                  issueId: issue.node_id,
                  issueNumber: issue.number,
                  blockingIssueId: blockingIssue.node_id,
                  blockingIssueNumber: upstreamIssueNumber,
                });
                removedCount += 1;
              }

              for (const downstreamIssue of existingBlocking) {
                const downstreamIssueNumber = downstreamIssue.number;
                if (targetBlocking.has(downstreamIssueNumber)) {
                  continue;
                }

                const blockedIssue = await resolveRelationshipIssue(downstreamIssue);
                const shouldRemove = shouldRemoveStaleBlockedBy({
                  blockedIssue,
                  blockingIssue: currentIssue,
                  previouslyDeclaredByThisIssue: previouslyDeclaredBlocking.has(downstreamIssueNumber),
                });
                if (!shouldRemove) {
                  skippedCount += 1;
                  continue;
                }

                await removeBlockedByRelationship({
                  issueId: blockedIssue.node_id,
                  issueNumber: downstreamIssueNumber,
                  blockingIssueId: issue.node_id,
                  blockingIssueNumber: issue.number,
                });
                removedCount += 1;
              }

              for (const upstreamIssueNumber of upstreamIssueNumbers) {
                if (existingBlockedByNumbers.has(upstreamIssueNumber)) {
                  skippedCount += 1;
                  continue;
                }

                const blockingIssueId = await resolveIssueNodeId(upstreamIssueNumber);
                const added = await addBlockedByRelationship({
                  issueId: issue.node_id,
                  issueNumber: issue.number,
                  blockingIssueId,
                  blockingIssueNumber: upstreamIssueNumber,
                });
                addedCount += added ? 1 : 0;
              }

              for (const downstreamIssueNumber of downstreamIssueNumbers) {
                if (existingBlockingNumbers.has(downstreamIssueNumber)) {
                  skippedCount += 1;
                  continue;
                }

                const downstreamIssueId = await resolveIssueNodeId(downstreamIssueNumber);
                const added = await addBlockedByRelationship({
                  issueId: downstreamIssueId,
                  issueNumber: downstreamIssueNumber,
                  blockingIssueId: issue.node_id,
                  blockingIssueNumber: issue.number,
                });
                addedCount += added ? 1 : 0;
              }

              core.info(`Native issue relationship sync complete: ${addedCount} added, ${removedCount} removed, ${skippedCount} already present.`);
            };

            let syncState = 'blocked';
            let syncErrorMessage = '';
            try {
              const projectResult = await projectGraphql(projectQuery, {
                login: projectOwner,
                number: projectNumber,
              });
              const project = projectResult.user?.projectV2;
              if (!project) {
                throw new Error(`Project '${projectName}' was not found for ${projectOwner}.`);
              }

              const fieldByName = new Map();
              for (const field of project.fields.nodes.filter(Boolean)) {
                fieldByName.set(field.name, field);
              }

              let itemResult = await projectGraphql(itemQuery, { issueId: issue.node_id });
              let item = itemResult.node.projectItems.nodes.find((node) => node.project.id === project.id);

              if (!item) {
                const added = await projectGraphql(addItemMutation, {
                  projectId: project.id,
                  contentId: issue.node_id,
                });
                item = added.addProjectV2ItemById.item;
              }

              const updateSingleSelect = async (fieldName, optionName) => {
                const field = fieldByName.get(fieldName);
                if (!field?.options) {
                  throw new Error(`Project field '${fieldName}' is missing or is not single-select.`);
                }
                const option = field.options.find((candidate) => candidate.name === optionName);
                if (!option) {
                  throw new Error(`Project field '${fieldName}' has no option '${optionName}'.`);
                }
                await projectGraphql(updateFieldMutation, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: field.id,
                  value: { singleSelectOptionId: option.id },
                });
              };

              const updateText = async (fieldName, text) => {
                const field = fieldByName.get(fieldName);
                if (!field) {
                  throw new Error(`Project field '${fieldName}' is missing.`);
                }
                await projectGraphql(updateFieldMutation, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: field.id,
                  value: { text },
                });
              };

              await updateSingleSelect('Status', projectStatus);
              await updateSingleSelect('Group', group);
              await updateSingleSelect('Priority', priority);
              await updateSingleSelect('Batch', batch);
              await updateSingleSelect('Module', moduleName);
              await updateSingleSelect('Risk', risk);
              await updateText('Dependency', dependency);
              await updateText(
                'OwnerNote',
                `自动同步自 issue #${issue.number}；任务编号 ${taskCode}；由 Task Issue Sync 更新。`
              );

              await syncNativeIssueRelationships();

              syncState = 'synced';
            } catch (error) {
              syncErrorMessage = error.message;
              core.warning(
                `Task issue sync failed. Configure PROJECTS_TOKEN as a token owned by or granted access to the user-level Project '${projectName}', with Project read/write access. Ensure GITHUB_TOKEN has issue write permission for relationship sync. ${error.message}`
              );
            }

            const syncLinePattern = /^- Project sync：`?(pending|synced|blocked)`?`?$/imu;
            const nextSyncLine = `- Project sync：\`${syncState}\``;
            let nextBody = body;

            if (syncLinePattern.test(nextBody)) {
              nextBody = nextBody.replace(syncLinePattern, nextSyncLine);
            } else {
              nextBody = `${nextBody.trimEnd()}\n${nextSyncLine}\n`;
            }

            if (nextBody !== body) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: nextBody,
              });
            }

            if (syncState === 'blocked') {
              core.setFailed(`Task issue #${issue.number} sync blocked. ${syncErrorMessage}`);
            } else {
              core.info(`Task issue #${issue.number} sync state: ${syncState}.`);
            }
