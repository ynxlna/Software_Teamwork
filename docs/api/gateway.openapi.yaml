openapi: 3.0.3
info:
  title: Power Knowledge Platform Gateway API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Frontend-facing API contract for the gateway service.
    All stable public and service-to-service HTTP APIs must use RESTful resource-oriented paths.
    This revision treats gateway health checks, user/session, file-owned routes,
    and knowledge-owned knowledge base, document processing, chunk, and retrieval
    routes as active contracts. Downstream QA, document/report, and admin
    aggregation interfaces remain under x-missing-contracts until finalized.
x-api-style:
  required: RESTful resource-oriented HTTP APIs
  appliesTo:
  - public gateway APIs
  - service-to-service HTTP APIs
  rules:
  - Model stable routes as resources or resource collections.
  - Use HTTP methods for actions: GET reads, POST creates, PATCH updates, DELETE removes.
  - Do not put action verbs such as login, logout, register, download, search, generate, export, retry, or revoke in stable paths.
  - Model long-running work as resources such as jobs, files, sessions, messages, events, or queries.
  exceptions:
  - GET /healthz
  - GET /readyz
servers:
- url: /
  description: Gateway root
security:
- bearerAuth: []
tags:
- name: health
  description: Gateway process and readiness checks.
- name: auth
  description: User and session APIs owned by auth service.
- name: knowledge
  description: Knowledge base, document processing, chunk, and retrieval APIs owned by knowledge service.
- name: documents
  description: File-owned document upload, metadata, deletion, and content APIs.
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
  /readyz:
    get:
      tags:
      - health
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Gateway is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
  /api/v1/users:
    post:
      tags:
      - auth
      summary: Create user
      operationId: createUser
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User and session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    post:
      tags:
      - auth
      summary: Create session
      operationId: createSession
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/current:
    delete:
      tags:
      - auth
      summary: Delete current session
      operationId: deleteCurrentSession
      x-owner-service: auth
      responses:
        '204':
          description: Current session deleted.
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/users/me:
    get:
      tags:
      - auth
      summary: Get current user
      operationId: getCurrentUser
      x-owner-service: auth
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases:
    get:
      tags:
      - knowledge
      summary: List knowledge bases
      operationId: listKnowledgeBases
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      responses:
        '200':
          description: Knowledge bases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - knowledge
      summary: Create knowledge base
      operationId: createKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgeBaseRequest'
      responses:
        '201':
          description: Knowledge base created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: Get knowledge base
      operationId: getKnowledgeBase
      x-owner-service: knowledge
      responses:
        '200':
          description: Knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - knowledge
      summary: Update knowledge base
      operationId: updateKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKnowledgeBaseRequest'
      responses:
        '200':
          description: Knowledge base updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      description: Updating chunk or retrieval strategies may require reprocessing documents; reprocessing job behavior is owned by knowledge service.
    delete:
      tags:
      - knowledge
      summary: Delete knowledge base
      operationId: deleteKnowledgeBase
      x-owner-service: knowledge
      responses:
        '204':
          description: Knowledge base deleted.
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}/documents:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: List knowledge-base documents
      operationId: listKnowledgeBaseDocuments
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Documents in the knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - documents
      summary: Upload a document to a knowledge base
      operationId: uploadKnowledgeBaseDocument
      x-owner-service: file
      description: Gateway exposes the file upload workflow. File service owns raw upload and file metadata; knowledge service owns ingestion state, chunks, embeddings, and retrieval after handoff.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Document accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: Get document processing details
      operationId: getDocument
      x-owner-service: knowledge
      responses:
        '200':
          description: Document processing details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - documents
      summary: Update document tags
      operationId: updateDocument
      x-owner-service: file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Document updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
      description: Update file-owned document metadata only. Knowledge-owned processing fields are not mutated by this operation.
    delete:
      tags:
      - documents
      summary: Delete document
      operationId: deleteDocument
      x-owner-service: file
      responses:
        '204':
          description: Document deleted.
        '404':
          $ref: '#/components/responses/Error'
      description: Delete the file-owned document record and original object. Gateway or file service must coordinate knowledge index cleanup through the knowledge-owned document lifecycle.
  /api/v1/documents/{documentId}/chunks:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: List document chunks
      operationId: listDocumentChunks
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      responses:
        '200':
          description: Document chunks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChunkListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}/content:
    get:
      tags:
      - documents
      summary: Get original document content
      operationId: getDocumentContent
      x-owner-service: file
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Original file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/Error'
      description: Return the original file content from the file service through gateway.
  /api/v1/knowledge-queries:
    post:
      tags:
      - knowledge
      summary: Create knowledge query
      operationId: createKnowledgeQuery
      x-owner-service: knowledge
      description: Run a resource-mode knowledge retrieval query. Query execution is modeled as creating a knowledge-query resource, not as an action-style search path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeQueryRequest'
      responses:
        '201':
          description: Knowledge query result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeQueryResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - status
          properties:
            status:
              type: string
              example: ok
        requestId:
          type: string
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          enum:
          - validation_error
          - unauthorized
          - forbidden
          - not_found
          - conflict
          - rate_limited
          - dependency_error
          - internal_error
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    CreateUserRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    CreateSessionRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    UserSummary:
      type: object
      required:
      - id
      - username
      - roles
      - permissions
      properties:
        id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    SessionSummary:
      type: object
      required:
      - sessionId
      - accessToken
      - tokenType
      - expiresAt
      properties:
        sessionId:
          type: string
        accessToken:
          type: string
          description: Bearer credential sent by the frontend on later requests.
        tokenType:
          type: string
          enum:
          - Bearer
          default: Bearer
        expiresAt:
          type: string
          format: date-time
    SessionResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - user
          - session
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            session:
              $ref: '#/components/schemas/SessionSummary'
        requestId:
          type: string
    UserResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/UserSummary'
        requestId:
          type: string
    PageInfo:
      type: object
      required:
      - page
      - pageSize
      - total
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    JsonObject:
      type: object
      additionalProperties: true
    ChunkStrategy:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          example: SEMANTIC_TEXT
        chunkSize:
          type: integer
          minimum: 1
          example: 1600
        overlap:
          type: integer
          minimum: 0
          example: 200
        separators:
          type: array
          items:
            type: string
    RetrievalStrategy:
      type: object
      additionalProperties: true
      properties:
        mode:
          type: string
          example: VECTOR
        topK:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        scoreThreshold:
          type: number
          minimum: 0
          example: 0.35
        rerankTopN:
          type: integer
          minimum: 1
          nullable: true
    CreateKnowledgeBaseRequest:
      type: object
      required:
      - name
      properties:
        id:
          type: string
          description: Optional client-supplied ID for import or local integration workflows. Gateway implementations may ignore this field and generate an ID.
        name:
          type: string
        description:
          type: string
          default: ''
        docType:
          type: string
          example: GENERAL
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        docType:
          type: string
          example: GENERAL
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
    KnowledgeBaseSummary:
      type: object
      required:
      - id
      - name
      - description
      - docType
      - chunkStrategy
      - retrievalStrategy
      - documentCount
      - chunkCount
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        docType:
          type: string
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
        documentCount:
          type: integer
          minimum: 0
        chunkCount:
          type: integer
          minimum: 0
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    KnowledgeBaseResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/KnowledgeBaseSummary'
        requestId:
          type: string
    KnowledgeBaseListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeBaseSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    DocumentStatus:
      type: string
      enum:
      - uploaded
      - parsing
      - chunking
      - embedding
      - ready
      - failed
    DocumentSummary:
      type: object
      required:
      - id
      - knowledgeBaseId
      - name
      - status
      - chunkCount
      - createdAt
      properties:
        id:
          type: string
        knowledgeBaseId:
          type: string
          description: Target knowledge base context for this document.
        name:
          type: string
        contentType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          minimum: 0
        status:
          $ref: '#/components/schemas/DocumentStatus'
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
          description: Processing failure summary. Must not include object keys, internal paths, SQL details, MinIO errors, or stack traces.
        chunkCount:
          type: integer
          minimum: 0
        tags:
          type: array
          items:
            type: string
        parserBackend:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        jobId:
          type: string
          nullable: true
          description: Ingestion job ID when a request starts or observes a processing job.
    UpdateDocumentRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
    DocumentResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/DocumentSummary'
        requestId:
          type: string
    DocumentListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    DocumentChunk:
      type: object
      required:
      - id
      - knowledgeBaseId
      - documentId
      - chunkIndex
      - content
      - tokenCount
      - createdAt
      properties:
        id:
          type: string
        knowledgeBaseId:
          type: string
        documentId:
          type: string
        chunkIndex:
          type: integer
          minimum: 0
        sectionPath:
          type: string
          nullable: true
        content:
          type: string
        tokenCount:
          type: integer
          minimum: 0
        chunkType:
          type: string
          nullable: true
        qdrantPointId:
          type: string
          nullable: true
        embeddingProvider:
          type: string
          nullable: true
        embeddingDimension:
          type: integer
          minimum: 1
          nullable: true
        embeddingPreview:
          type: array
          nullable: true
          items:
            type: number
        metadata:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          type: string
          format: date-time
    DocumentChunkListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentChunk'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    KnowledgeQueryRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
        knowledgeBaseIds:
          type: array
          items:
            type: string
        topK:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        scoreThreshold:
          type: number
          minimum: 0
          default: 0
        tags:
          type: array
          items:
            type: string
        metadataFilter:
          type: object
          additionalProperties:
            type: string
        rerank:
          type: boolean
          default: false
        rerankTopN:
          type: integer
          minimum: 1
          nullable: true
    KnowledgeQueryResult:
      type: object
      required:
      - score
      - knowledgeBaseId
      - documentId
      - chunkId
      - documentName
      - contentPreview
      properties:
        score:
          type: number
        pointId:
          type: string
        knowledgeBaseId:
          type: string
        documentId:
          type: string
        chunkId:
          type: string
        documentName:
          type: string
        sectionPath:
          type: string
          nullable: true
        chunkIndex:
          type: integer
          minimum: 0
          nullable: true
        contentPreview:
          type: string
        tags:
          type: array
          items:
            type: string
    KnowledgeQueryTrace:
      type: object
      required:
      - embeddingProvider
      - embeddingModel
      - embeddingDimension
      - qdrantCollection
      - searchTopK
      - scoreThreshold
      - hitCount
      - rerank
      properties:
        embeddingProvider:
          type: string
        embeddingModel:
          type: string
        embeddingDimension:
          type: integer
          minimum: 1
        qdrantCollection:
          type: string
        searchTopK:
          type: integer
          minimum: 1
        scoreThreshold:
          type: number
          minimum: 0
        hitCount:
          type: integer
          minimum: 0
        rerank:
          type: boolean
        rerankTopN:
          type: integer
          nullable: true
          minimum: 1
    KnowledgeQuerySummary:
      type: object
      required:
      - id
      - query
      - results
      - trace
      properties:
        id:
          type: string
        query:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeQueryResult'
        trace:
          $ref: '#/components/schemas/KnowledgeQueryTrace'
    KnowledgeQueryResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/KnowledgeQuerySummary'
        requestId:
          type: string
x-missing-contracts:
- service: qa
  status: missing
  reason: Frontend/backend chat and RAG contract is not finalized yet.
  placeholderOperations:
  - GET/POST /api/v1/qa-sessions
  - GET/DELETE /api/v1/qa-sessions/{sessionId}
  - GET/POST /api/v1/qa-sessions/{sessionId}/messages
  - GET /api/v1/qa-sessions/{sessionId}/events
- service: document
  status: missing
  reason: Frontend/backend report-generation contract is not finalized yet.
  placeholderOperations:
  - GET/POST /api/v1/reports
  - GET/PATCH/DELETE /api/v1/reports/{reportId}
  - GET/POST /api/v1/reports/{reportId}/outlines
  - GET/POST /api/v1/reports/{reportId}/sections
  - GET /api/v1/reports/{reportId}/events
  - POST /api/v1/report-files
  - GET /api/v1/report-files/{reportFileId}
