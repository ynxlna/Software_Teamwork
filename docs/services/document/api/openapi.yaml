openapi: 3.0.3
info:
  title: Report Generation API
  version: 0.1.0
  description: Local draft for document-owned report templates, reports, outlines, sections, generated files, report jobs, settings, and stats. The stable public contract is the gateway OpenAPI. JSON and file-content endpoints use opaque Bearer token auth; model calls use AI Gateway with an OpenAI-compatible API; async report work is executed by asynq workers; DOCX output is generated by a Document worker using a Pandoc/LibreOffice-style toolchain.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Templates
  - name: Reports
  - name: Outlines
  - name: Sections
  - name: ReportFiles
  - name: Jobs
  - name: Settings
  - name: Stats
  - name: Logs
paths:
  /report-types:
    get:
      tags: [Reports]
      summary: List report types
      responses:
        '200':
          description: Supported report types
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTypeList' }
        default: { $ref: '#/components/responses/Error' }
  /report-templates:
    get:
      tags: [Templates]
      summary: List report templates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: reportType
          in: query
          schema: { $ref: '#/components/schemas/ReportTypeCode' }
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TemplatePage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Templates]
      summary: Create report template
      description: Creates a document-owned report template resource from a multipart upload. Document service stores template metadata and internally reuses file service for the underlying file object.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateTemplateRequest' }
      responses:
        '201':
          description: Created template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
  /report-templates/{reportTemplateId}:
    parameters:
      - $ref: '#/components/parameters/ReportTemplateId'
    get:
      tags: [Templates]
      summary: Get report template
      responses:
        '200':
          description: Template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Templates]
      summary: Update report template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTemplateRequest' }
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Templates]
      summary: Delete report template
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /report-templates/{reportTemplateId}/structure:
    get:
      tags: [Templates]
      summary: Get report template structure
      parameters:
        - $ref: '#/components/parameters/ReportTemplateId'
      responses:
        '200':
          description: Template structure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TemplateStructure' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Templates]
      summary: Update report template structure
      parameters:
        - $ref: '#/components/parameters/ReportTemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTemplateStructureRequest' }
      responses:
        '200':
          description: Updated template structure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TemplateStructure' }
        default: { $ref: '#/components/responses/Error' }
  /reports:
    get:
      tags: [Reports]
      summary: List reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: reportType
          in: query
          schema: { $ref: '#/components/schemas/ReportTypeCode' }
        - name: year
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Reports]
      summary: Create report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportRequest' }
      responses:
        '201':
          description: Created report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get report
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Reports]
      summary: Update report metadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateReportRequest' }
      responses:
        '200':
          description: Updated report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Reports]
      summary: Delete report
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/outlines:
    get:
      tags: [Outlines]
      summary: List report outlines
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Outline list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Outlines]
      summary: Create report outline
      description: Manual outline saves create a new outline version. AI-created outlines are produced by report jobs.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOutlineRequest' }
      responses:
        '201':
          description: Created outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/outlines/{outlineId}:
    get:
      tags: [Outlines]
      summary: Get report outline
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/OutlineId'
      responses:
        '200':
          description: Outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Outlines]
      summary: Update report outline
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/OutlineId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOutlineRequest' }
      responses:
        '200':
          description: Updated outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/outlines/{outlineId}/sections/{sectionId}:
    delete:
      tags: [Outlines]
      summary: Delete report outline section
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/OutlineId'
        - $ref: '#/components/parameters/SectionId'
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections:
    get:
      tags: [Sections]
      summary: List report sections
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Section list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Sections]
      summary: Create report section
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSectionRequest' }
      responses:
        '201':
          description: Created section
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections/{sectionId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
      - $ref: '#/components/parameters/SectionId'
    get:
      tags: [Sections]
      summary: Get report section
      responses:
        '200':
          description: Section
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Sections]
      summary: Update report section
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSectionRequest' }
      responses:
        '200':
          description: Updated section
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections/{sectionId}/versions:
    get:
      tags: [Sections]
      summary: List report section versions
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/SectionId'
      responses:
        '200':
          description: Section version list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportSectionVersion' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Sections]
      summary: Create report section version
      description: Creates a new section content version. AI-created section versions are also represented by this resource.
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/SectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSectionVersionRequest' }
      responses:
        '201':
          description: Created section version
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSectionVersion' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/jobs:
    get:
      tags: [Jobs]
      summary: List report jobs
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Report job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportJob' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Jobs]
      summary: Create report job
      description: Creates long-running work for outline creation, content creation, section version creation, or report file creation.
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportJobRequest' }
      responses:
        '202':
          description: Report job accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportJob' }
        default: { $ref: '#/components/responses/Error' }
  /report-jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get report job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Report job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportJob' }
        default: { $ref: '#/components/responses/Error' }
  /report-jobs/{jobId}/attempts:
    get:
      tags: [Jobs]
      summary: List report job attempts
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Report job attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportJobAttempt' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Jobs]
      summary: Create report job attempt
      description: Creates a new attempt for an existing failed or interrupted report job.
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportJobAttemptRequest' }
      responses:
        '202':
          description: Report job attempt accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportJobAttempt' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/events:
    get:
      tags: [Jobs]
      summary: List report events
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Report event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportEvent' }
        default: { $ref: '#/components/responses/Error' }
  /report-files:
    get:
      tags: [ReportFiles]
      summary: List report files
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: reportId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Report file list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ReportFile' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [ReportFiles]
      summary: Create report file
      description: Creates generated report files such as DOCX without exposing storage internals to frontend clients.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportFileRequest' }
      responses:
        '202':
          description: Report file accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportFile' }
        default: { $ref: '#/components/responses/Error' }
  /report-files/{reportFileId}:
    get:
      tags: [ReportFiles]
      summary: Get report file
      parameters:
        - $ref: '#/components/parameters/ReportFileId'
      responses:
        '200':
          description: Report file metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportFile' }
        default: { $ref: '#/components/responses/Error' }
  /report-files/{reportFileId}/content:
    get:
      tags: [ReportFiles]
      summary: Get report file content
      parameters:
        - $ref: '#/components/parameters/ReportFileId'
      responses:
        '200':
          description: Generated report file stream
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        default: { $ref: '#/components/responses/Error' }
  /report-materials:
    get:
      tags: [Reports]
      summary: List report materials
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: category
          in: query
          schema: { type: string }
        - name: enabled
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Report material list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ReportMaterial' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Reports]
      summary: Create report material
      description: Creates a document-owned report material resource from a multipart upload. Document service stores material metadata and internally reuses file service for the underlying file object.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateReportMaterialRequest' }
      responses:
        '201':
          description: Created report material
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportMaterial' }
        default: { $ref: '#/components/responses/Error' }
  /report-materials/{materialId}:
    get:
      tags: [Reports]
      summary: Get report material
      parameters:
        - $ref: '#/components/parameters/MaterialId'
      responses:
        '200':
          description: Report material
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportMaterial' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Reports]
      summary: Delete report material
      parameters:
        - $ref: '#/components/parameters/MaterialId'
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /report-settings:
    get:
      tags: [Settings]
      summary: Get report settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSettings' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Settings]
      summary: Update report settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportSettingsUpdate' }
      responses:
        '200':
          description: Updated timestamp
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdatedAt' }
        default: { $ref: '#/components/responses/Error' }
  /report-statistics/overview:
    get:
      tags: [Stats]
      summary: Get report overview stats
      responses:
        '200':
          description: Report stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportStats' }
        default: { $ref: '#/components/responses/Error' }
  /report-statistics/daily:
    get:
      tags: [Stats]
      summary: List daily report statistics
      parameters:
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 366, default: 30 }
      responses:
        '200':
          description: Daily report statistics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportDailyStats' }
        default: { $ref: '#/components/responses/Error' }
  /report-operation-logs:
    get:
      tags: [Logs]
      summary: List report operation logs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: targetType
          in: query
          schema: { type: string }
        - name: targetId
          in: query
          schema: { type: string }
        - name: operationType
          in: query
          schema: { type: string }
        - name: requestId
          in: query
          schema: { type: string }
        - name: requestSource
          in: query
          schema: { type: string }
        - name: toolName
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Report operation logs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportOperationLogPage' }
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    ReportTemplateId:
      name: reportTemplateId
      in: path
      required: true
      schema: { type: string }
    ReportId:
      name: reportId
      in: path
      required: true
      schema: { type: string }
    SectionId:
      name: sectionId
      in: path
      required: true
      schema: { type: string }
    OutlineId:
      name: outlineId
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string }
    ReportFileId:
      name: reportFileId
      in: path
      required: true
      schema: { type: string }
    MaterialId:
      name: materialId
      in: path
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ReportTypeCode:
      type: string
      enum: [summer_peak_inspection, coal_inventory_audit]
    ReportType:
      type: object
      required: [code, name, enabled]
      properties:
        code: { $ref: '#/components/schemas/ReportTypeCode' }
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        defaultTemplateId: { type: string }
    ReportTypeList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReportType' }
    ReportStatus:
      type: string
      enum: [draft, outline_generating, outline_generated, content_generating, generated, exporting, exported, failed, deleted]
    SectionStatus:
      type: string
      enum: [pending, generating, ready, pending_review, failed, canceled]
    SectionType:
      type: string
      enum: [text, table, image, mixed]
    ReportTemplate:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        filename: { type: string }
        fileSize: { type: integer, format: int64 }
        status: { type: string, enum: [active, inactive, deleted] }
        styleProfile:
          type: object
          additionalProperties: true
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTemplateRequest:
      type: object
      required: [name, reportType, file]
      properties:
        name: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        file:
          type: string
          format: binary
        styleProfile:
          type: object
          additionalProperties: true
    UpdateTemplateRequest:
      type: object
      properties:
        name: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        styleProfile:
          type: object
          additionalProperties: true
    TemplateStructure:
      type: object
      properties:
        outlineSchema:
          type: array
          items: { $ref: '#/components/schemas/OutlineSeedNode' }
        materialMappings:
          type: array
          items:
            type: object
            properties:
              sectionTitle: { type: string }
              tagFilters:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }
    UpdateTemplateStructureRequest:
      allOf:
        - $ref: '#/components/schemas/TemplateStructure'
    TemplatePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/ReportTemplate' }
    Report:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        specialty: { type: string }
        plantName: { type: string }
        year: { type: integer }
        status: { $ref: '#/components/schemas/ReportStatus' }
        templateId: { type: string }
        ownerUserId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateReportRequest:
      type: object
      required: [title, reportType]
      properties:
        title: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        specialty: { type: string }
        plantName: { type: string }
        year: { type: integer }
        templateId: { type: string }
        topic: { type: string }
    UpdateReportRequest:
      type: object
      properties:
        title: { type: string }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        specialty: { type: string }
        plantName: { type: string }
        year: { type: integer }
        templateId: { type: string }
        topic: { type: string }
    ReportPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Report' }
    OutlineNode:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        parentId: { type: string, nullable: true }
        number: { type: string }
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        sortOrder: { type: integer }
        children:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
    OutlineSeedNode:
      type: object
      properties:
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        required: { type: boolean }
        children:
          type: array
          items: { $ref: '#/components/schemas/OutlineSeedNode' }
    OutlineResponse:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        status: { $ref: '#/components/schemas/ReportStatus' }
        outline:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        affectedSectionIds:
          type: array
          description: Sections marked as pending_review after outline changes.
          items: { type: string }
    UpdateOutlineRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        autoRenumber: { type: boolean }
    CreateSectionRequest:
      type: object
      required: [outlineNodeId, title]
      properties:
        outlineNodeId: { type: string }
        number: { type: string }
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
    ReportSection:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        outlineNodeId: { type: string }
        number: { type: string }
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        status: { $ref: '#/components/schemas/SectionStatus' }
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
        citations:
          type: array
          items:
            type: object
            additionalProperties: true
        updatedAt: { type: string, format: date-time }
    UpdateSectionRequest:
      type: object
      properties:
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
    ReportSectionVersion:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        sectionId: { type: string }
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
        source: { type: string, enum: [manual, job] }
        createdAt: { type: string, format: date-time }
    CreateSectionVersionRequest:
      type: object
      properties:
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
        source: { type: string, enum: [manual, job], default: manual }
    CreateReportJobRequest:
      type: object
      required: [jobType]
      properties:
        jobType:
          type: string
          enum: [outline_generation, outline_regeneration, content_generation, content_regeneration, section_regeneration, report_file_creation]
        sectionIds:
          type: array
          items: { type: string }
        topic: { type: string }
        instruction: { type: string }
        materialFilters:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        retrieval:
          type: object
          additionalProperties: true
        file:
          $ref: '#/components/schemas/CreateReportFileRequest'
    CreateReportFileRequest:
      type: object
      required: [reportId, format]
      properties:
        reportId: { type: string }
        format: { type: string, enum: [docx] }
        styleProfileId: { type: string }
        numberingMode:
          type: string
          enum: [global, by_chapter]
          description: global is supported for MVP; by_chapter may return unsupported_numbering_mode.
    ReportFile:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        filename: { type: string }
        fileSize: { type: integer, format: int64 }
        contentPath:
          type: string
          example: /api/v1/report-files/rf_123/content
        format: { type: string, enum: [docx] }
        status: { type: string, enum: [pending, running, succeeded, partial_succeeded, failed, canceled] }
        styleProfileVersion: { type: string }
        numberingMode:
          type: string
          enum: [global, by_chapter]
          description: global is supported for MVP; by_chapter is reserved for later.
        createdAt: { type: string, format: date-time }
    ReportJob:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        jobType: { type: string, enum: [outline_generation, outline_regeneration, content_generation, content_regeneration, section_regeneration, report_file_creation] }
        status: { type: string, enum: [pending, running, succeeded, partial_succeeded, failed, canceled] }
        attemptCount:
          type: integer
          description: Current attempt count persisted in PostgreSQL.
        maxAttempts:
          type: integer
          description: Automatic retry limit; fixed to 3 for MVP.
        progress:
          type: object
          properties:
            completed: { type: integer }
            total: { type: integer }
        currentSectionId: { type: string }
        errorMessage: { type: string, nullable: true }
        attempts:
          type: array
          description: Recent attempt summaries, capped at the latest 10 attempts.
          items: { $ref: '#/components/schemas/ReportJobAttempt' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ReportJobAttempt:
      type: object
      properties:
        id: { type: string }
        jobId: { type: string }
        attemptNumber: { type: integer }
        stage: { type: string }
        status: { type: string }
        errorCode: { type: string, nullable: true }
        errorMessage: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
    CreateReportJobAttemptRequest:
      type: object
      properties:
        reason: { type: string }
    ReportEvent:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        jobId: { type: string }
        eventType: { type: string }
        payload:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
    ReportMaterial:
      type: object
      properties:
        materialId: { type: string }
        name: { type: string }
        materialType: { type: string }
        filename: { type: string }
        fileSize: { type: integer, format: int64 }
        tags:
          type: object
          additionalProperties: { type: string }
        usedBySections:
          type: array
          items: { type: string }
    CreateReportMaterialRequest:
      type: object
      required: [name, materialType, file]
      properties:
        name: { type: string }
        materialType: { type: string }
        file:
          type: string
          format: binary
        tags:
          type: object
          additionalProperties: { type: string }
    ReportSettings:
      type: object
      properties:
        llm: { $ref: '#/components/schemas/ModelConfigPublic' }
        defaultTemplates:
          type: object
          additionalProperties: { type: string }
        file:
          type: object
          properties:
            defaultFormat: { type: string, enum: [docx] }
            defaultNumberingMode:
              type: string
              enum: [global, by_chapter]
              description: global is supported for MVP.
            defaultStyleProfileId: { type: string }
          additionalProperties: true
    ReportSettingsUpdate:
      allOf:
        - $ref: '#/components/schemas/ReportSettings'
        - type: object
          properties:
            llm: { $ref: '#/components/schemas/ModelConfigWritable' }
    ModelConfigPublic:
      type: object
      properties:
        provider:
          type: string
          description: Fixed to ai-gateway for MVP.
          example: ai-gateway
        profileId:
          type: string
          description: AI Gateway model profile id.
        model: { type: string }
        timeoutSeconds: { type: integer }
    ModelConfigWritable:
      allOf:
        - $ref: '#/components/schemas/ModelConfigPublic'
    ReportStats:
      type: object
      properties:
        templateCount: { type: integer }
        reportCount: { type: integer }
        trend30d:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              generatedCount: { type: integer }
    ReportDailyStatistic:
      type: object
      properties:
        date: { type: string, format: date }
        reportType: { $ref: '#/components/schemas/ReportTypeCode' }
        createdCount: { type: integer, minimum: 0 }
        generatedCount: { type: integer, minimum: 0 }
        failedCount: { type: integer, minimum: 0 }
        exportedCount: { type: integer, minimum: 0 }
    ReportDailyStats:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReportDailyStatistic' }
    ReportOperationLog:
      type: object
      properties:
        id: { type: string }
        operatorId: { type: string }
        operatorName: { type: string }
        operationType: { type: string }
        targetType: { type: string }
        targetId: { type: string }
        requestId: { type: string }
        requestSource: { type: string }
        toolName: { type: string }
        parameterSummary:
          type: object
          additionalProperties: true
          description: Sanitized parameter summary for MCP or API calls.
        operationResult: { type: string }
        errorMessage: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
          description: Sanitized audit metadata for troubleshooting and filtering.
        createdAt: { type: string, format: date-time }
    ReportOperationLogPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/ReportOperationLog' }
    UpdatedAt:
      type: object
      properties:
        updatedAt: { type: string, format: date-time }
    Page:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum: [validation_error, unauthorized, forbidden, not_found, conflict, rate_limited, dependency_error, internal_error, unsupported_intent, unsupported_mode, unsupported_numbering_mode]
            message: { type: string }
            requestId: { type: string }
            fields:
              type: object
              additionalProperties: { type: string }
