name: ${COMPOSE_PROJECT_NAME:-software_teamwork_knowledge}

services:
  knowledge-api:
    build:
      context: .
    image: software-teamwork/knowledge-service:local
    container_name: knowledge-api
    environment:
      KNOWLEDGE_HTTP_ADDR: ":8000"
      KNOWLEDGE_SERVICE_VERSION: ${KNOWLEDGE_SERVICE_VERSION:-0.3.0}
      KNOWLEDGE_ENV: ${KNOWLEDGE_ENV:-local}
      KNOWLEDGE_STORAGE_BACKEND: ${KNOWLEDGE_STORAGE_BACKEND:-memory}
      DATABASE_URL: ${DATABASE_URL:-postgres://knowledge:knowledge@postgres:5432/knowledge?sslmode=disable}
      FILE_SERVICE_BASE_URL: ${FILE_SERVICE_BASE_URL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hashing}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local_hashing}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-knowledge_chunks}
    ports:
      - "${KNOWLEDGE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/knowledge-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: knowledge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: knowledge-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge-qdrant
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: knowledge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: knowledge-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-documents}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set none "local/$${MINIO_BUCKET}"
    restart: "no"

  adminer:
    image: adminer:latest
    container_name: knowledge-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: knowledge-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
